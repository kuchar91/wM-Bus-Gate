packages:
  hal: !include
    file: lilygo_t3_s3_hal.yaml
  resources: github://IoTLabs-pl/wM-Bus-Gateway/packages/resources.yaml@master
  version: github://IoTLabs-pl/wM-Bus-Gateway/packages/version.yaml@master

external_components:
  - source: 
      type: git
      url: https://github.com/IoTLabs-pl/ESPHome-Components
      ref: ${esphome_components_version}
    components:
      - wmbus_common
      - wmbus_radio
      - wmbus_meter
  - source: 
      type: git
      url: https://github.com/IoTLabs-pl/wM-Bus-Gateway
      ref: ${wmbus_gateway_version}
    components:
      - wmbus_gateway
time:
  - platform: sntp
    id: time_sntp

button:
  - platform: restart
    name: Restart

sensor:
  - platform: internal_temperature
    name: "Internal Temperature"
    
  - platform: uptime
    type: seconds
    name: Uptime

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

wmbus_radio:
  on_frame:
    - then:
        - repeat:
            count: 20
            then:
              - light.control:
                  id: wmbus_gateway_status_led
                  state: !lambda return iteration % 2 == 0;
              - delay: 50ms
              
wmbus_gateway:
  resources:
    font_large: font_large
    font_small: font_small
    qrcode: qrcode
    logo: logo
